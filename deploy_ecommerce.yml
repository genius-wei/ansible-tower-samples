- name: deploy web server
  hosts: web
  become: yes
  tasks:
    - name: install nginx
      yum:
        name: nginx
        state: present

    - name: start nginx
      service:
        name: nginx
        state: started
        enabled: yes

- name: deploy database
  hosts: db
  become: yes
  tasks:
    - name: install mysql
      yum:
        name: mariadb-server
        state: present

    - name: start mysql
      service:
        name: mariadb
        state: started
        enabled: yes


- name: deploy web page
  copy:
    content: "Hello E-commerce System"
    dest: /usr/share/nginx/html/index.html
