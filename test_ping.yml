- name: 主机互联互通自动化检测
  hosts: all
  gather_facts: no

  vars:
    ansible_env:
      LANG: zh_CN.UTF-8
      LC_ALL: zh_CN.UTF-8

  tasks:

    - name: 执行主机连通性检测
      ping:
      register: ping_result

    - name: 输出连通性检测结果
      debug:
        msg: "主机 {{ inventory_hostname }} 连通状态: {{ ping_result.ping }}"
